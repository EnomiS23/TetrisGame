<html>
    <head>
        <meta name="description" content="Buga Simone PAI"/>
        <link rel="stylesheet" type="text/css" href="style.css"/>
        <title>TetrisGame</title>
    </head>
    <body>
        <div id="main_background" class="main_background">
        <div class="header"><text class="title_text" id="title_text">Wellcome to my Tetris Game!</text></div>
        <div class="menu">
            
        </div>
       
         <div id="content" class="content">
        <button id="new_game1" popovertarget="new_game" class="select"><span class="text">New Game</span></button>
        <button id="continuegame" popovertarget="continue_game" class="select"><span class="text">Continue</span></button>
        <button id="leader_board" popovertarget="leaderboard" class="select"><span class="text">Leaderboard</span></button>
        
       <div id="new_game" class="new_game" popover>
    <div class="gradient-container">
        <div class="gradient"></div>
    </div>

    <div class="glass-overlay">
        <div class="antet">
           
                <h2>Score</h2>
                <div id="score">0</div>
                
                <button id="play_button" class='play_button'></button>
                <div id="username" style="font-size: 20px;"></div>
            <button id="home" popovertarget="new_game" popovertargetaction="hide" class="game_buttons">X</button>

    
        </div>
        
        <canvas id="tetris"></canvas>
    </div>
    
    
</div>
<div id="continue_game" class="continue_game" popover>
   <div class="gradient-container">
        <div class="gradient"></div>
    </div>

    <div class="glass-overlay">
        <div class="antet_continue">
            <h2>Logs</h2>
            <button id="home1" popovertarget="continue_game" popovertargetaction="hide" class="game_buttons">X</button>

                
    
        </div>
        <div id="logs" class="logs">
            <span class="text_lc">GameName</span>
            <span class="text_lc">Score</span></div>
        
</div> </div>

    <div id="leaderboard" class="continue_game" popover>
         <div class="gradient-container">
        <div class="gradient"></div>
    </div>
    <div class="glass-overlay">
            <div class="antet">
                <h2>Leaderboard</h2>
                 <button id="home2" popovertarget="leaderboard" popovertargetaction="hide" class="game_buttons">X</button>
                 
            </div>
        <div id="lead_list"  class="lead_list">
            <span class="text_lc">Place</span>
            <span class="text_lc">Username</span>
            <span class="text_lc">GameName</span>
            <span class="text_lc">Score</span>
        </div>
        </div>
    </div>
       
        <div class="another_content1"></div>
        <div class="footer"></div>
        </div>
       
        <div class="splashscreen" id="splashscreen">
          
    
              <h1 style="color:white">Wellcome to my Tetris Game!</h1>

   <div class="coolinput">
    <label for="input" class="text">Username:</label>
    <input id="username_input" type="text" placeholder="Write here..." name="input" class="input">
</div>
     <button type="submit" class="username_btn" id="username_btn"><span class="text">OK</span></button>
        </div>



<div class="save_the_game" id="save_the_game">
     <h1 style="color:white">Save your progress...</h1>
    <div class="coolinput">
        <input id="username_input" type="text" placeholder="Enter a name for the game" name="input" class="input">
    </div>
    <div class="body_save_game">
     <button type="submit" class="save_cancel" id="agree_the_save"><span class="text">Yes</span></button>
      <button type="submit" class="save_cancel" id="cancel_the_save"><span class="text">No</span></button>
</div>
</div>

</div>
       
        <script type="text/javascript" src="java.js"></script>
    </body>
</html>
