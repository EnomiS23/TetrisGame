<html>
    <head>
        <meta name="description" content="Buga Simone PAI"/>
        <link rel="stylesheet" type="text/css" href="style.css"/>
        <title>TetrisGame</title>
    </head>
    <body style=" background-color: rgb(155, 11, 203);">
        <div id="main_background" class="main_background">
        <div class="header"><h2>Wellcome to my Tetris Game!</h2></div>
        <div class="menu"></div>
       
         <div id="content" class="content">
         
 
        <button popovertarget="new_game" class="select">New Game</button>
        <button popovertarget="continue_game" class="select"  >Continue</button>
        <button popovertarget="leaderboard" class="select">Leaderboard</button>
        <div id="new_game" class="new_game" popover>
   
            <div class="antet">
                
                <button popovertarget="new_game" popovertargetaction="hide" class="game_buttons"></button>
                <h3>Start New Game</h3>
            </div>
            <canvas id="tetris" ></canvas>
            <script type ="text/javascript" src="java.js"></script>
        
    </div>

<div id="continue_game" class="continue_game" popover>
    <div class="antet">
        <button popovertarget="continue_game" popovertargetaction="hide" class="game_buttons"></button>
        <h3>Continue Game</h3>
    </div>
    <canvas id="tetris"></canvas>
</div>

    <div id="leaderboard" class="leaderboard" popover>
        
            <div class="antet">
                <button popovertarget="leaderboard" popovertargetaction="hide" class="game_buttons"></button>
                 <h3>Leaderboard</h3>
            </div>
        
        
    </div>
        </div>
        <div class="another_content1"></div>
        <div class="footer"></div>
        </div>

        <script type ="text/javascript" src="java.js"></script>
